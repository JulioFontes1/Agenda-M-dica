<!DOCTYPE html>
<html>

<body>

<h2>Login</h2>


{% with messages = get_flashed_messages(with_categories=true) %}

    {% if messages %}

        {% for category, message in messages %}

            <p>
                {{ message }}
            </p>

        {% endfor %}

    {% endif %}

{% endwith %}



<form method="POST">

    <input 
        type="email"
        name="email"
        placeholder="Email"
    >


    <input 
        type="password"
        name="password"
        placeholder="Senha"
    >


    <button>
        Entrar
    </button>

</form>


</body>

</html>
